<!DOCTYPE html>
<html>
<head>
	<!-- META ATTRIBUTES -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- WEBSITE -->
	<title>Team Checker | Intramurals '26</title>
	<link rel="icon" type="image/x-icon" href="favicon.png">

	<!-- PYTHON -->
	<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
	<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

	<!-- BS5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

	<!-- ANIMATE CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

	<!-- INTERNAL CSS -->
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&display=swap');

		:root {
			--blue: #024A85;
			--blue-light: #0a6ab8;
			--blue-dark: #013362;
			--blue-faint: rgba(2, 74, 133, 0.06);
			--blue-glow: rgba(2, 74, 133, 0.18);
			--white: #FFFFFF;
			--bg: #F5F7FA;
			--card: #FFFFFF;
			--border: #D8E3EE;
			--border-strong: #B8CEDF;
			--text: #0D1F30;
			--text-secondary: #3A5168;
			--muted: #7A92A8;
		}

		body {
			font-family: 'Catamaran';
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			overflow-x: hidden;
		}

		.bg {
			position: fixed;
			inset: 0;
			z-index: 0;
			background:
				radial-gradient(ellipse at 10% 30%, rgba(2, 74, 133, 0.06) 0%, transparent 55%),
				radial-gradient(ellipse at 90% 10%, rgba(2, 74, 133, 0.04) 0%, transparent 50%),
				radial-gradient(ellipse at 50% 100%, rgba(2, 74, 133, 0.05) 0%, transparent 50%),
				#F5F7FA;
		}

		/* GRAPHING PAPER BG */
		.bg::before {
			content: '';
			position: absolute;
			inset: 0;
			background-image:
			repeating-linear-gradient(
				0deg,
				transparent,
				transparent 60px,
				rgba(2, 74, 133, 0.025) 60px,
				rgba(2, 74, 133, 0.025) 61px
			),
			repeating-linear-gradient(
				90deg,
				transparent,
				transparent 60px,
				rgba(2, 74, 133, 0.025) 60px,
				rgba(2, 74, 133, 0.025) 61px
			);
		}

		.particles {
			position: fixed;
			inset: 0;
			z-index: 0;
			pointer-events: none;
		}

		.particle {
			position: absolute;
			border-radius: 50%;
			animation: floatUp linear infinite;
			opacity: 0;
		}

		@keyframes floatUp {
			0%   { transform: translateY(100vh) scale(1); opacity: 0; }
			10%  { opacity: 0.55; }
			90%  { opacity: 0.2; }
			100% { transform: translateY(-120px) scale(0.6); opacity: 0; }
		}

		.page-wrapper {
			position: relative;
			z-index: 1;
			padding: 56px 0 90px;
		}

		.event {
			display: inline-block;
			font-family: 'Catamaran';
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 4px;
			text-transform: uppercase;
			color: var(--white);
			padding: 6px 18px;
			border-radius: 2px;
			margin-bottom: 22px;
			background: var(--blue);
			box-shadow: 0 4px 16px rgba(2, 74, 133, 0.25);
		}

		.hero-title {
			font-family: 'Catamaran';
			font-size: clamp(58px, 11vw, 92px);
			line-height: 0.88;
			color: var(--blue);
			margin-bottom: 14px;
		}

		.hero-title .accent {
			color: var(--blue-light);
		}

		.intra-card {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 46px;
			position: relative;
			overflow: hidden;
			box-shadow: 
				0 4px 24px rgba(2, 74, 133, 0.08),
				0 1px 3px rgba(0, 0, 0, 0.06);
		}

		.intra-card::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 3px;
			background: linear-gradient(90deg, var(--blue-dark), var(--blue), var(--blue-light));
		}

		.card-section-title {
			font-family: 'Catamaran';
			font-size: 1.75rem;
			letter-spacing: 3px;
			color: var(--blue);
			margin-bottom: 28px;
			display: flex;
			align-items: center;
			gap: 15px;
		}

		/* FORM */
		.field-label {
			font-family: 'Catamaran';
			font-size: 11px;
			font-weight: 700;
			letter-spacing: 3px;
			text-transform: uppercase;
			color: var(--muted);
			margin-bottom: 9px;
		}

		.intra-select {
			background: var(--white);
			border: 1px solid var(--border);
			border-radius: 4px;
			color: var(--text);
			font-family: 'Catamaran';
			font-size: 15px;
			padding: 13px 16px;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.intra-select:focus {
			border-color: var(--blue);
			box-shadow: 0 0 0 3px rgba(2, 74, 133, 0.12);
			color: var(--text);
			background: var(--white);
		}

		.intra-select option {
			background: var(--white);
			color: var(--text);
		}

		.chk-item {
			display: flex;
			align-items: center;
			gap: 13px;
			cursor: pointer;
			padding: 13px 16px;
			border: 1px solid var(--border);
			border-radius: 4px;
			transition: all 0.2s;
			user-select: none;
			margin-bottom: 11px;
			background: var(--white);
		}

		.chk-item:hover {
			border-color: var(--blue);
			background: var(--blue-faint);
		}

		.chk-item input[type="checkbox"] {
			width: 18px;
			height: 18px;
			accent-color: var(--blue);
			cursor: pointer;
			flex-shrink: 0;
		}

		.chk-label {
			font-size: 14px;
			color: var(--text-secondary);
		}

		/* BUTTON */
		.btn-intra {
			width: 100%;
			padding: 16px;
			font-family: 'Catamaran';
			font-size: 23px;
			letter-spacing: 5px;
			color: var(--white);
			background: var(--blue);
			border: none;
			border-radius: 4px;
			cursor: pointer;
			transition: all 0.2s;
			position: relative;
			overflow: hidden;
		}

		.btn-intra::before {
			content: '';
			position: absolute;
			inset: 0;
			background: linear-gradient(135deg, var(--blue-light), var(--blue-dark));
			opacity: 0;
			transition: opacity 0.25s;
		}

		.btn-intra:hover::before {
			opacity: 1;
		}

		.btn-intra:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 28px rgba(2, 74, 133, 0.35);
		}

		.btn-intra:active {
			transform: translateY(0);
		}

		.btn-intra span {
			position: relative;
			z-index: 1;
		}

		/* RESULTS */
		.result-box {
			border-radius: 5px;
			padding: 28px;
			animation: slideIn 0.35s ease;
		}

		@keyframes slideIn {
			from { transform: translateY(14px); opacity: 0; }
			to   { transform: translateY(0);    opacity: 1; }
		}

		.result-box.eligible {
			background: rgba(0, 170, 90, 0.06);
			border: 1px solid rgba(0, 170, 90, 0.3);
		}

		.result-box.ineligible {
			background: rgba(200, 40, 40, 0.05);
			border: 1px solid rgba(200, 40, 40, 0.25);
		}

		.result-status {
			font-family: 'Catamaran';
			font-size: 42px;
			letter-spacing: 3px;
			margin-bottom: 8px;
		}

		.ineligible .result-status { color: #C82828; }

		.team-badge {
			margin-top: 22px;
			padding: 18px 22px;
			border-radius: 4px;
			display: flex;
			align-items: center;
			gap: 18px;
			border: 1px solid;
		}

		.team-badge.green  { border-color: rgba(0, 200, 100, 0.5);  background: rgba(0, 200, 100, 0.25); }
		.team-badge.red    { border-color: rgba(255, 50, 50, 0.5);   background: rgba(255, 50, 50, 0.25); }
		.team-badge.yellow { border-color: rgba(255, 220, 0, 0.5);   background: rgba(255, 220, 0, 0.25); }
		.team-badge.blue   { border-color: rgba(50, 130, 255, 0.5);  background: rgba(50, 130, 255, 0.25); }

		.team-name {
			font-family: 'Catamaran';
			font-size: 30px;
			letter-spacing: 2px;
		}

		.green  .team-name { color: #007A3D; }
		.red    .team-name { color: #C41E1E; }
		.yellow .team-name { color: #A67C00; }
		.blue   .team-name { color: #1A4FAF; }

		.team-desc {
			font-family: 'Catamaran';
			font-size: 12px;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: var(--muted);
			margin-top: 2px;
		}

		.team-info {
			padding-top: 0;
		}

		@media (max-width: 576px) {
			.team-badge {
				flex-direction: column;
				align-items: flex-start;
				height: auto !important;
			}

			.team-info {
				padding-top: 8px;
			}
		}
	</style>
</head>
<body>
	<div class="bg"></div>
	<div class="particles" id="particles"></div>

	<div class="page-wrapper">
		<div class="container">
			<!-- HEADER -->
			<div class="text-center mb-3">
				<div class="event">OBSA Intramurals 2026</div>
				<h1 class="hero-title fw-bold">TEAM CHECKER</h1>
			</div>

			<!-- TEAM CHECKER -->
			<div class="row justify-content-center">
				<div class="col-12 col-md-9 col-lg-7">
					<div class="intra-card">

						<div class="card-section-title fw-bold">
							<span>🦋</span> STUDENT INFORMATION
						</div>

						<!-- FORM -->
						<div class="mb-4">
							<label class="chk-item">
								<input type="checkbox" name="register" id="registered"/>
								<span class="chk-label">Student is registered online</span>
							</label>
							<label class="chk-item">
								<input type="checkbox" name="clear" id="medical"/>
								<span class="chk-label">Student has medical clearance</span>
							</label>
						</div>

						<!-- GRADE AND SECTION -->
						<div class="row g-3 mb-2">
							<div class="col-6">
								<label class="field-label d-block">Grade Level</label>
								<select class="intra-select form-select" id="level">
									<option value="">Select Grade</option>
									<option value="7">Grade 7</option>
									<option value="8">Grade 8</option>
									<option value="9">Grade 9</option>
									<option value="10">Grade 10</option>
								</select>
							</div>
							<div class="col-6">
								<label class="field-label d-block">Section</label>
								<select class="intra-select form-select" id="section">
									<option value="">Select Section</option>
									<option value="emerald">Emerald</option>
									<option value="ruby">Ruby</option>
								</select>
							</div>
						</div>

						<!-- BUTTON -->
						<button class="btn-intra mt-3" py-click="intrams_checker">
							<span>WHERE DO YOU BELONG?</span>
						</button>

						<!-- RESULT, DETAILED IN PYTHON -->
						<div id="result" class="mt-4">
							<div id="image"></div>
						</div>

					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		// thank you Claude AI for making this look very beautiful...
		const pc = document.getElementById('particles');

		for (let i = 0; i < 25; i++) {
			const p = document.createElement('div');
			p.className = 'particle';

			p.style.left              = Math.random() * 100 + '%';
			p.style.width             = (2 + Math.random() * 3) + 'px';
			p.style.height            = p.style.width;
			p.style.background        = Math.random() > 0.5 ? '#024A85' : '#0a6ab8';
			p.style.animationDuration = (10 + Math.random() * 14) + 's';
			p.style.animationDelay    = (Math.random() * 14) + 's';

			pc.appendChild(p);
		}
	</script>
	<py-script src="main.py"></py-script>
</body>
</html>
